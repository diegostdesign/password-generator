<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Signika:wght@700&display=swap" rel="stylesheet">

    <body>
        <div id="container">
            <h1 id="heading">Generate a <br><span id="green">random password</span></h1>
            <p id="paragraph">Never use an insecure password again.</p>
            <button id="password-button" onclick="generatePasswords()">Generate password</button>
            <hr id="separator-line">
            <div id="passwords-container">
                <div class="password-container">
                    <p id="password-container-left" class="neon-green"></p>
                </div>
                <div class="password-container">
                    <p id="password-container-right" class="neon-green"></p>
                </div>
            </div>
        </div>
        <script type="text/javascript" src="index.js"></script>
    </body>
